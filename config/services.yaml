services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $aiQueryLimiter: '@limiter.guiziweb_grid_assistant'

    Guiziweb\SyliusGridAssistantPlugin\:
        resource: '../src/*'
        exclude: '../src/{DependencyInjection,Entity,Migrations}'

    Symfony\UX\Autocomplete\AutocompleterRegistry:
        alias: 'ux.autocomplete.autocompleter_registry'

    Guiziweb\SyliusGridAssistantPlugin\Resolver\GridQueryResolver:
        arguments:
            $platform: '@?Symfony\AI\Platform\PlatformInterface'
            $model: '%guiziweb.grid_assistant.model%'

    Guiziweb\SyliusGridAssistantPlugin\Twig\Extension\GridAssistantExtension:
        arguments:
            $enabledGrids: '%guiziweb.grid_assistant.enabled_grids%'

    Guiziweb\SyliusGridAssistantPlugin\Twig\Component\GridAssistantComponent:
        tags:
            - { name: 'sylius.live_component.admin', key: 'guiziweb:grid_assistant:search', template: '@GuiziwebSyliusGridAssistantPlugin/components/grid_assistant.html.twig' }